<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #333;
            text-align: center;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .export-btn {
            background: #4CAF50;
            color: white;
        }

        .export-btn:hover {
            background: #45a049;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .export-btn:active {
            transform: scale(0.98);
        }

        .import-btn {
            background: #2196F3;
            color: white;
        }

        .import-btn:hover {
            background: #0b7dda;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .import-btn:active {
            transform: scale(0.98);
        }

        .settings-btn {
            background: #667eea;
            color: white;
        }

        .settings-btn:hover {
            background: #5568d3;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .settings-btn:active {
            transform: scale(0.98);
        }

        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 3px;
            font-size: 12px;
            text-align: center;
            min-height: 20px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h2>🚗 Car Notes</h2>
    <div class="button-group">
        <button id="exportBtn" class="export-btn">📥 Export Notes</button>
        <button id="importBtn" class="import-btn">📤 Import Notes</button>
        <button id="settingsBtn" class="settings-btn">⚙️ Settings</button>
    </div>
    <div id="status" class="status"></div>
    <script src="popup.js"></script>
</body>
</html>
